name: Aspire Samples CI

on:
  push:
    branches: [main]
    paths-ignore:
      - "**/*.md"
      - "**/*.gitignore"
      - "**/*.gitattributes"
  
  pull_request:
    paths-ignore:
      - "**/*.md"
      - "**/*.gitignore"
      - "**/*.gitattributes"

  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    name: Build & Test Samples
    env:
      DOTNET_CLI_TELEMETRY_OPTOUT: true
      DOTNET_NOLOGO: true
      DOTNET_MULTILEVEL_LOOKUP: false
      DOTNET_INSTALL_DIR: ${{ matrix.os == 'ubuntu-latest' && '' || 'dotnet' }}
      ASPIRE_ALLOW_UNSECURED_TRANSPORT: true
      ASPIRE_CLI_TELEMETRY_OPTOUT: true
      SuppressNETCoreSdkPreviewMessage: true
      DCP_DIAGNOSTICS_LOG_LEVEL: 'debug'
    steps:
    - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
  
    - name: Install Docker (latest version)
      if: matrix.os == 'ubuntu-latest'
      uses: docker/setup-docker-action@6d7cfa65f60a9dda7b46e5513fa982536f3c9877 #v5.3.0

    - name: Install Azure Functions Core Tools
      if: matrix.os == 'ubuntu-latest'
      run: |
        wget -q https://packages.microsoft.com/config/ubuntu/20.04/packages-microsoft-prod.deb
        sudo dpkg -i packages-microsoft-prod.deb
        sudo apt-get update
        sudo apt-get install azure-functions-core-tools-4

    - name: Install .NET SDK (global.json)
      uses: actions/setup-dotnet@a98b56852c35b8e3190ac28c8c2271da59106c68 # v6.0.0
      with:
        global-json-file: ${{ matrix.os == 'ubuntu-latest' && './build/global.json' || '.\build\global.json' }}
    
    - name: Print .NET info
      run: dotnet --info

    - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
      with:
        node-version: '24.x'

    - name: Install Aspire CLI (Ubuntu)
      if: matrix.os == 'ubuntu-latest'
      shell: bash
      run: |
        install_path="$RUNNER_TEMP/aspire-cli"
        curl -sSL https://aspire.dev/install.sh | bash -s -- --install-path "$install_path" --skip-path
        echo "$install_path" >> "$GITHUB_PATH"
        echo "ASPIRE_CLI=$install_path/aspire" >> "$GITHUB_ENV"
        "$install_path/aspire" --version

    - name: Install Aspire CLI (Windows)
      if: matrix.os == 'windows-latest'
      shell: pwsh
      run: |
        $installScript = Join-Path $env:RUNNER_TEMP 'aspire-install.ps1'
        $installPath = Join-Path $env:RUNNER_TEMP 'aspire-cli'
        $aspirePath = Join-Path $installPath 'aspire.exe'

        Invoke-RestMethod 'https://aspire.dev/install.ps1' -OutFile $installScript
        & $installScript -InstallPath $installPath -SkipPath

        $installPath | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
        "ASPIRE_CLI=$aspirePath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

        & $aspirePath --version

    - name: Install & trust dev-certs
      id: install-dev-certs
      # Trusting certs on Windows throws a prompt so will halt the build
      if: matrix.os == 'ubuntu-latest'
      run: dotnet dev-certs https --trust

    - name: Restore TypeScript AppHosts
      if: matrix.os == 'ubuntu-latest'
      shell: bash
      run: |
        set -euo pipefail

        while IFS= read -r apphost; do
          sample_dir="$(dirname "$apphost")"
          sample_name="${apphost#./samples/}"
          echo "::group::Restore $sample_name"
          (
            cd "$sample_dir"
            "$ASPIRE_CLI" restore --apphost . --non-interactive --nologo
            npm ci --no-audit --no-fund
          )
          echo "::endgroup::"
        done < <(find ./samples -name apphost.mts | sort)

    - name: Build (Ubuntu)
      if: matrix.os == 'ubuntu-latest'
      run: ./build/build.sh -p:SkipTypeScriptRestore=true

    - name: Build (Windows)
      if: matrix.os == 'windows-latest'
      run: .\build\build.cmd

    - name: Copy binlog files
      if: always()
      shell: pwsh
      run: |
        $binlogFiles = Get-ChildItem -Path . -Filter *.binlog -Recurse
        if ($binlogFiles.Count -gt 0) {
          New-Item -ItemType Directory -Force -Path ./BuildLogs
          foreach ($file in $binlogFiles) {
            Copy-Item -Path $file.FullName -Destination ./BuildLogs
            Write-Host "Copied: $($file.FullName)"
          }
        } else {
          Write-Host "No .binlog files found"
        }

    - name: Publish binlog files
      if: always()
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: BuildLogs_${{ matrix.os }}
        path: ./BuildLogs
        if-no-files-found: ignore

    - name: Test
      id: test
      # We only test on Ubuntu because Windows agents don't support Docker with WSL
      if: matrix.os == 'ubuntu-latest'
      # Note that the space after the last double dash (--) is intentional
      run: >
        dotnet test ./tests/SamplesTests.slnx
        --logger console --logger trx --logger html --logger GitHubActions
        --results-directory ./TestResults --blame
        -- 
        RunConfiguration.CollectSourceInformation=true

    - name: Copy DCP logs
      if: (success() || steps.test.conclusion == 'failure') && matrix.os == 'ubuntu-latest'
      run: |
        mkdir -p ./TestResults/DCPLogs
        TEMP_DIR="${TMPDIR:-/tmp}"
        cp -r "$TEMP_DIR/dcp/logs/"* ./TestResults/DCPLogs
    
    - name: Publish Test Results
      if: (success() || steps.test.conclusion == 'failure') && matrix.os == 'ubuntu-latest'
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: TestResults_${{ matrix.os }}
        path: ./TestResults
